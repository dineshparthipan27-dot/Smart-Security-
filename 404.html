<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - System Route Not Found</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #050b14;
      background-image:
        radial-gradient(circle at 50% 0%, rgba(255, 183, 3, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 183, 3, 0.05) 0%, transparent 40%);
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      overflow: hidden;
    }


    .cyber-card {
      text-align: center;
      width: 100%;
      max-width: 520px;
      background: #0b1220;
      padding: 3.5rem 2.5rem;
      border-radius: 16px;
      border: 1px solid #1e293b;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 40px rgba(255, 183, 3, 0.08);
      position: relative;
      overflow: hidden;
      animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }


    .cyber-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFB703, #fb8500, transparent);
      box-shadow: 0 0 15px #FFB703;
    }


    @keyframes cardAppear {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.85);
      }
    }

    @keyframes glowPulse {

      0%,
      100% {
        filter: drop-shadow(0 0 15px rgba(255, 183, 3, 0.3));
      }

      50% {
        filter: drop-shadow(0 0 25px rgba(255, 183, 3, 0.6));
      }
    }



    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 183, 3, 0.1);
      border: 1px solid rgba(255, 183, 3, 0.3);
      color: #FFB703;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      font-family: monospace;
      box-shadow: 0 0 10px rgba(255, 183, 3, 0.15);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #FFB703;
      border-radius: 50%;
      box-shadow: 0 0 8px #FFB703;
      animation: pulse 1.5s infinite ease-in-out;
    }


    .error-code {
      font-size: 7rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #ffffff 0%, #FFB703 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
      animation: float 4s ease-in-out infinite, glowPulse 3s infinite;
      display: inline-block;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.75rem;
    }

    p {
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }


    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
    }


    .btn-back {
      background: #0f172a;
      color: #cbd5e1;
      border: 1px solid #334155;
    }

    .btn-back:hover {
      background: #1e293b;
      color: #ffffff;
      border-color: #FFB703;
      box-shadow: 0 0 15px rgba(255, 183, 3, 0.15);
      transform: translateY(-2px);
    }


    .btn-home {
      background: linear-gradient(135deg, #FFB703 0%, #fb8500 100%);
      color: #050b14;
      border: none;
      box-shadow: 0 0 20px rgba(255, 183, 3, 0.3);
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255, 183, 3, 0.6);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(0);
    }


    @media (max-width: 480px) {
      .cyber-card {
        padding: 2.5rem 1.5rem;
      }

      .error-code {
        font-size: 5.5rem;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="cyber-card">
    <div class="status-badge">
      <span class="status-dot"></span>
      System Alert // 404_Not_Found
    </div>

    <div class="error-code">404</div>

    <h1>Sector Unreachable</h1>
    <p>The page or endpoint you are attempting to access has been moved, archived, or does not exist on this server.</p>

    <div class="button-group">
      <button onclick="goBack()" class="btn btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Go Back
      </button>

      <a href="/" class="btn btn-home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Homepage ⚡
      </a>
    </div>
  </div>

  <script>

    function goBack() {
      if (window.history.length > 1 && document.referrer !== "") {
        window.history.back();
      } else {
        window.location.href = "/";
      }
    }
  </script>

</body>

</html>
